<div style="display:flex;flex-direction:column;gap:16px" data-testid="listening-fill-in-blanks-renderer">

  <app-exercise-lesson-intro [goal]="content.learningGoal ?? null" />

  @if (content.instructions) {
    <div class="sp-alert-info" style="font-size:13px">{{ content.instructions }}</div>
  }

  @if (content.scenario) {
    <div class="sp-card" style="padding:14px 18px">
      <p class="sp-eyebrow" style="margin-bottom:6px">Context</p>
      <p style="font-size:14px;font-weight:600;color:var(--sp-text);line-height:1.65">{{ content.scenario }}</p>
    </div>
  }

  @if (content.audioScript) {
    <app-audio-player
      [audioUrl]="content.audioUrl"
      [audioScript]="content.audioScript"
      label="Audio"
      helpText="Listen to the audio, then complete the missing words below."
    />
  }

  <div class="passage-container sp-card" style="padding:16px" data-testid="passage-with-blanks">
    <p class="passage-text" style="font-size:14px;color:var(--sp-text);line-height:1.9">
      @for (part of passageParts; track $index) {
        @if (part.gapId) {
          <select
            class="gap-select"
            [(ngModel)]="selections[part.gapId]"
            [disabled]="disabled"
            [attr.aria-label]="'Select word for ' + part.gapId"
            [attr.data-testid]="'gap-select-' + part.gapId"
          >
            <option value="" disabled selected>-- select --</option>
            @for (opt of gapOptions(part.gapId); track opt) {
              <option [value]="opt">{{ opt }}</option>
            }
          </select>
        } @else {
          {{ part.text }}
        }
      }
    </p>
  </div>

  <button (click)="submit()"
    [disabled]="disabled || !canSubmit"
    class="sp-button-primary"
    style="width:100%"
    data-testid="listening-fill-in-blanks-submit-btn">
    @if (disabled) { Checking answers… } @else { Check answers }
  </button>
</div>
