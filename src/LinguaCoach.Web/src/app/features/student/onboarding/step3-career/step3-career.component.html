<div class="sp-card">
  <div class="mb-5">
    <p class="sp-eyebrow mb-2">Step 3 of 4</p>
    <h1 class="text-xl font-bold text-slate-950">What is your job, field, or target workplace context?</h1>
    <p class="mt-2 text-sm leading-6 text-slate-600">SpeakPath uses your workplace context to create realistic, relevant practice scenarios.</p>
  </div>

  @if (error()) {
    <div class="sp-alert-error mb-5">{{ error() }}</div>
  }

  <div class="mb-4">
    <input
      type="text"
      [ngModel]="careerText()"
      (ngModelChange)="careerText.set($event)"
      placeholder="e.g. Junior software engineer, project planner, nurse, customer support officer"
      class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-200"
      [attr.aria-label]="'Your job, field, or workplace context'"
    />
  </div>

  <div class="mb-6 flex flex-wrap gap-2">
    @for (s of suggestions; track s) {
      <button
        type="button"
        (click)="applySuggestion(s)"
        class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs font-medium text-slate-600 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
        {{ s }}
      </button>
    }
  </div>

  <div class="flex flex-col gap-3 sm:flex-row">
    <a routerLink="/onboarding/step-2" class="sp-button-secondary flex-1">Back</a>
    <button
      (click)="next()"
      [disabled]="!careerText().trim() || submitting()"
      class="sp-button-primary flex-1">
      @if (submitting()) { Saving... } @else { Continue }
    </button>
  </div>
</div>
