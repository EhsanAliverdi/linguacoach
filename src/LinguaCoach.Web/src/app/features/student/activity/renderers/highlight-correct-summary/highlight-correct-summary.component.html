<div style="display:flex;flex-direction:column;gap:16px" data-testid="highlight-correct-summary-renderer">

  <app-exercise-lesson-intro [goal]="content.learningGoal ?? null" />

  @if (content.instructions) {
    <div class="sp-alert-info" style="font-size:13px">{{ content.instructions }}</div>
  }

  @if (content.scenario) {
    <div class="sp-card" style="padding:14px 18px">
      <p class="sp-eyebrow" style="margin-bottom:6px">Context</p>
      <p style="font-size:14px;font-weight:600;color:var(--sp-text);line-height:1.65">{{ content.scenario }}</p>
    </div>
  }

  @if (content.audioScript || content.audioUrl) {
    <app-audio-player
      [audioUrl]="content.audioUrl"
      [audioScript]="content.audioScript"
      label="Audio"
      helpText="Listen to the audio, then choose the summary that best matches it."
    />
  }

  <div style="font-size:15px;font-weight:700;color:var(--sp-text)" data-testid="summary-question">
    {{ content.question }}
  </div>

  <div style="display:flex;flex-direction:column;gap:10px" data-testid="summary-options">
    @for (opt of content.options; track opt.id) {
      <button
        type="button"
        (click)="select(opt.id)"
        [disabled]="disabled"
        class="sp-card"
        [style.border]="selectedOptionId === opt.id ? '2px solid var(--sp-primary, #2563eb)' : '1px solid var(--sp-border)'"
        [attr.aria-pressed]="selectedOptionId === opt.id"
        [attr.data-testid]="'summary-option-' + opt.id"
        style="padding:14px 16px;text-align:left;display:flex;gap:12px;align-items:flex-start;cursor:pointer">
        <span style="font-weight:800;color:var(--sp-listening);min-width:20px">{{ opt.id }}</span>
        <span style="font-size:14px;color:var(--sp-text);line-height:1.6">{{ opt.text }}</span>
      </button>
    }
  </div>

  <button (click)="submit()"
    [disabled]="disabled || !canSubmit"
    class="sp-button-primary"
    style="width:100%"
    data-testid="highlight-correct-summary-submit-btn">
    @if (disabled) { Checking answer… } @else { Check answer }
  </button>
</div>
