<div class="sp-page flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <a href="/" class="sp-brand justify-center">
        <span class="sp-brand-mark">S</span>
        <span>SpeakPath</span>
      </a>
      <p class="mt-3 text-sm leading-6 text-slate-600">Practise workplace messages before you send them.</p>
    </div>

    <div class="sp-card">
      <h1 class="text-xl font-bold text-slate-950">Sign in</h1>
      <p class="mt-1 text-sm text-slate-500">Pilot access for SpeakPath students and admins.</p>

      @if (notice()) {
        <div class="sp-alert-info mt-5">
          {{ notice() }}
        </div>
      }

      @if (error()) {
        <div class="sp-alert-error mt-5">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate class="mt-6">
        <div class="space-y-4">
          <div>
            <label for="email" class="sp-label">Email</label>
            <input
              id="email"
              type="email"
              name="email"
              [(ngModel)]="email"
              required
              autocomplete="email"
              placeholder="you@example.com"
              class="sp-input"
            />
          </div>

          <div>
            <label for="password" class="sp-label">Password</label>
            <input
              id="password"
              type="password"
              name="password"
              [(ngModel)]="password"
              required
              autocomplete="current-password"
              placeholder="Password"
              class="sp-input"
            />
          </div>
        </div>

        <button type="submit" [disabled]="loading()" class="sp-button-primary mt-6 w-full">
          @if (loading()) { Signing in... } @else { Sign in }
        </button>
      </form>
    </div>
  </div>
</div>
