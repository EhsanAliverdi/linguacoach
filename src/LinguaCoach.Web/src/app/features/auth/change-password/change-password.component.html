<div class="sp-page flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <div class="sp-brand justify-center">
        <span class="sp-brand-mark">S</span>
        <span>SpeakPath</span>
      </div>
    </div>

    <div class="sp-card">
      <p class="sp-eyebrow mb-2">First sign-in step</p>
      <h1 class="text-xl font-bold text-slate-950">Create your password</h1>
      <p class="mt-2 text-sm leading-6 text-slate-600">Your account was created with a temporary password. Set your own password before continuing to onboarding.</p>

      @if (notice()) {
        <div class="sp-alert-info mt-5">
          {{ notice() }}
        </div>
      }

      @if (error()) {
        <div class="sp-alert-error mt-5">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" novalidate class="mt-6 space-y-4">
        <div>
          <label class="sp-label">Current temporary password</label>
          <input type="password" [(ngModel)]="currentPassword" name="current" required autocomplete="current-password" class="sp-input" />
        </div>
        <div>
          <label class="sp-label">New password</label>
          <input type="password" [(ngModel)]="newPassword" name="new" required autocomplete="new-password" class="sp-input" />
          <p class="mt-1.5 text-xs text-slate-500">Use at least 8 characters.</p>
        </div>
        <div>
          <label class="sp-label">Confirm new password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirm" required autocomplete="new-password" class="sp-input" />
        </div>

        <button type="submit" [disabled]="loading()" class="sp-button-primary w-full">
          @if (loading()) { Saving... } @else { Set password and continue }
        </button>
      </form>
    </div>
  </div>
</div>
