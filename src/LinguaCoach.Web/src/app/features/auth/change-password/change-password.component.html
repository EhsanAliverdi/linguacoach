<div class="sp-public-centered">

  <!-- Logo above card -->
  <a routerLink="/" class="sp-public-logo">
    <svg width="36" height="36" viewBox="0 0 48 48" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="lg-chpw-logo" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
          <stop stop-color="#FF7A59"/><stop offset=".52" stop-color="#B45CF0"/><stop offset="1" stop-color="#5B4BE8"/>
        </linearGradient>
      </defs>
      <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg-chpw-logo)"/>
      <circle cx="14" cy="33" r="3.4" fill="#fff"/>
      <circle cx="24" cy="26" r="3.4" fill="#fff" opacity=".92"/>
      <path d="M30 12.5h6.5A3.5 3.5 0 0 1 40 16v3.5a3.5 3.5 0 0 1-3.5 3.5H34l-3.2 2.3.2-2.3h-1A3.5 3.5 0 0 1 26.5 19.5V16A3.5 3.5 0 0 1 30 12.5Z" fill="#fff"/>
      <path d="M15.4 30.6 22 27.2M25.7 23.4l3.2-2.6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".75"/>
    </svg>
    <div class="sp-public-logo-name">Speak<span>Path</span></div>
  </a>

  <!-- Form card -->
  <div class="sp-public-form-card">

    <p class="sp-eyebrow" style="margin-bottom:8px">First sign-in step</p>
    <h1 style="font-size:20px;font-weight:800;color:var(--sp-ink);margin:0 0 4px">Create your password</h1>
    <p style="font-size:14px;color:var(--sp-muted);margin:0 0 24px;line-height:1.55">Your account was created with a temporary password. Set your own password before continuing to onboarding.</p>

    @if (notice()) {
      <div class="sp-alert-info" style="margin-bottom:16px">{{ notice() }}</div>
    }

    @if (error()) {
      <div class="sp-alert-error" style="margin-bottom:16px">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" novalidate>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div>
          <label class="sp-label">Current temporary password</label>
          <input type="password" [(ngModel)]="currentPassword" name="current" required autocomplete="current-password" class="sp-input" />
        </div>
        <div>
          <label class="sp-label">New password</label>
          <input type="password" [(ngModel)]="newPassword" name="new" required autocomplete="new-password" class="sp-input" />
          <p style="margin-top:6px;font-size:12px;color:var(--sp-muted)">Use at least 8 characters.</p>
        </div>
        <div>
          <label class="sp-label">Confirm new password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirm" required autocomplete="new-password" class="sp-input" />
        </div>
      </div>

      <button type="submit" [disabled]="loading()" class="sp-button-primary" style="width:100%;margin-top:24px">
        @if (loading()) { Saving… } @else { Set password and continue }
      </button>
    </form>

  </div>

</div>
