<div class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-900">LinguaCoach</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h2 class="text-lg font-semibold text-slate-800 mb-1">Create your password</h2>
      <p class="text-sm text-slate-500 mb-5">Your account was created with a temporary password. Please set a new one to continue.</p>

      @if (error()) {
        <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" novalidate class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Current (temporary) password</label>
          <input type="password" [(ngModel)]="currentPassword" name="current" required autocomplete="current-password"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">New password</label>
          <input type="password" [(ngModel)]="newPassword" name="new" required autocomplete="new-password"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Confirm new password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirm" required autocomplete="new-password"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <button type="submit" [disabled]="loading()"
          class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700 disabled:opacity-50 transition-colors">
          @if (loading()) { Saving… } @else { Set password & continue }
        </button>
      </form>
    </div>
  </div>
</div>
