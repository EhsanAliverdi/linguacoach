<div class="sp-auth-page">
  <div class="sp-auth-card">
    <h1 class="sp-auth-title">Set new password</h1>

    @if (success()) {
      <div class="sp-auth-success" role="status">
        <p>Your password has been updated. You can now log in with your new password.</p>
        <button type="button" class="sp-button-primary sp-auth-submit" (click)="goToLogin()">
          Go to login
        </button>
      </div>
    } @else {
      @if (error()) {
        <div class="sp-alert-error" role="alert">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()" novalidate>
        <div class="sp-form-group">
          <label for="newPassword" class="sp-label">New password</label>
          <input
            id="newPassword"
            type="password"
            class="sp-input"
            [(ngModel)]="newPassword"
            name="newPassword"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>

        <div class="sp-form-group">
          <label for="confirmPassword" class="sp-label">Confirm new password</label>
          <input
            id="confirmPassword"
            type="password"
            class="sp-input"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            autocomplete="new-password"
            required
          />
        </div>

        <button
          type="submit"
          class="sp-button-primary sp-auth-submit"
          [disabled]="loading() || newPassword.length < 8"
        >
          @if (loading()) { Updating… } @else { Set new password }
        </button>
      </form>

      <p class="sp-auth-footer">
        <a routerLink="/login" class="sp-auth-link">Back to login</a>
      </p>
    }
  </div>
</div>
