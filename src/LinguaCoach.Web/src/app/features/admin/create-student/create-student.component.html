<div class="min-h-screen bg-slate-50 px-4 py-8">
  <div class="max-w-lg mx-auto">

    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-xl font-bold text-slate-900">Admin Panel</h1>
        <p class="text-sm text-slate-500 mt-0.5">{{ auth.currentUser()?.email }}</p>
      </div>
      <button (click)="auth.logout()" class="text-sm text-slate-500 hover:text-slate-700">Sign out</button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h2 class="text-base font-semibold text-slate-800 mb-1">Create student account</h2>
      <p class="text-sm text-slate-500 mb-5">The student will be prompted to change their password on first login.</p>

      @if (error()) {
        <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">{{ error() }}</div>
      }
      @if (success()) {
        <div class="mb-4 rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700">{{ success() }}</div>
      }

      <form (ngSubmit)="onSubmit()" novalidate class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Student email</label>
          <input type="email" [(ngModel)]="email" name="email" required placeholder="student@example.com"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Temporary password</label>
          <input type="text" [(ngModel)]="temporaryPassword" name="password" required placeholder="Min 8 chars, must include a digit"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <button type="submit" [disabled]="loading()"
          class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700 disabled:opacity-50 transition-colors">
          @if (loading()) { Creating… } @else { Create student }
        </button>
      </form>
    </div>

  </div>
</div>
