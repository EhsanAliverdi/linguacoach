<sp-admin-page-header
  title="Usage & Analytics"
  subtitle="API costs, activity trends and student engagement" />

<sp-admin-page-body>

  <!-- Period pills -->
  <div class="sp-ua-period-pills" aria-label="Date range">
    @for (p of periods; track p.value) {
      <button class="sp-ua-pill" [class.sp-ua-pill--active]="period() === p.value"
        (click)="setPeriod(p.value)" type="button">{{ p.label }}</button>
    }
  </div>

  <!-- KPI strip -->
  <div class="sp-admin-kpi-row" aria-label="Usage analytics summary">
    <sp-admin-kpi-card label="Total cost" variant="teal" layout="tile" icon="dollar"
      [loading]="loadingAiTrends()" [value]="totalCostDisplay()" />
    <sp-admin-kpi-card label="Total API calls" variant="indigo" layout="tile" icon="bar-chart"
      [loading]="loadingAiTrends()" [value]="totalCallsDisplay()" />
    <sp-admin-kpi-card label="Avg cost / student" variant="violet" layout="tile" icon="user"
      [loading]="loadingAiTrends()" [value]="avgCostDisplay()" />
    <sp-admin-kpi-card [label]="'Activities (' + periodLabel() + ')'" variant="green" layout="tile" icon="check"
      [loading]="loadingActivityTrends()" [value]="totalActivitiesDisplay()" />
  </div>

  <!-- Graphs row -->
  <div class="sp-ua-graph-row">

    <!-- API cost over time -->
    <sp-admin-graph-card
      title="API cost over time"
      [status]="loadingAiTrends() ? 'loading' : aiTrendsError() ? 'unavailable' : aiTrendItems().length === 0 ? 'unavailable' : 'live'"
>
      @if (loadingAiTrends()) {
        <sp-admin-visual-placeholder state="not-available" skeleton="chart" title="API cost over time" message="Loading..." />
      } @else if (aiTrendsError() || aiTrendItems().length === 0) {
        <sp-admin-visual-placeholder state="not-available" skeleton="chart" title="API cost over time" message="No cost data for this period" />
      } @else {
        <sp-admin-mini-bar-chart [items]="aiTrendItems()" tone="teal" [height]="56" ariaLabel="Daily cost bar chart" />
      }
    </sp-admin-graph-card>

    <!-- Activities completed per day -->
    <sp-admin-graph-card
      title="Activities completed per day"
      [status]="loadingActivityTrends() ? 'loading' : activityTrendsError() ? 'unavailable' : activityTrendItems().length === 0 ? 'unavailable' : 'live'"
>
      @if (loadingActivityTrends()) {
        <sp-admin-visual-placeholder state="not-available" skeleton="chart" title="Activities completed" message="Loading..." />
      } @else if (activityTrendsError() || activityTrendItems().length === 0) {
        <sp-admin-visual-placeholder state="not-available" skeleton="chart" title="Activities completed" message="No activity data for this period" />
      } @else {
        <sp-admin-mini-bar-chart [items]="activityTrendItems()" tone="indigo" [height]="56" ariaLabel="Daily activities bar chart" />
      }
    </sp-admin-graph-card>

  </div>

  <!-- Student engagement heatmap placeholder -->
  <sp-admin-graph-card
    title="Student engagement"
    status="unavailable"
>
    <sp-admin-visual-placeholder
      state="not-available"
      skeleton="grid"
      title="Activity by day of week"
      message="Engagement heatmap - backend not available yet" />
  </sp-admin-graph-card>

</sp-admin-page-body>
