<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
  <div class="mb-1 text-xs font-medium text-indigo-600 uppercase tracking-wide">Step 4 of 4</div>
  <h2 class="text-lg font-semibold text-slate-800 mb-1">What do you most want to improve?</h2>
  <p class="text-sm text-slate-500 mb-5">We'll focus your lessons on this skill first.</p>

  @if (error()) {
    <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">{{ error() }}</div>
  }

  <div class="space-y-2 mb-6">
    @for (skill of skills; track skill.value) {
      <button (click)="select(skill.value)"
        [class.ring-2]="selected() === skill.value"
        [class.ring-indigo-500]="selected() === skill.value"
        [class.border-indigo-300]="selected() === skill.value"
        class="w-full text-left rounded-xl border border-slate-200 px-4 py-3 hover:border-indigo-300 hover:bg-indigo-50 transition-all">
        <div class="font-medium text-slate-800">{{ skill.label }}</div>
        <div class="text-xs text-slate-500 mt-0.5">{{ skill.description }}</div>
      </button>
    }
  </div>

  <div class="flex gap-3">
    <a routerLink="/onboarding/step-3"
      class="flex-1 rounded-lg border border-slate-300 px-4 py-2.5 text-center text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
      Back
    </a>
    <button (click)="finish()" [disabled]="selected() === null || submitting()"
      class="flex-1 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700 disabled:opacity-50 transition-colors">
      @if (submitting()) { Finishing... } @else { Complete setup }
    </button>
  </div>
</div>
