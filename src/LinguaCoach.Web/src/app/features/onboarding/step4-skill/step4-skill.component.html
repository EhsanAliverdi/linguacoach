<div class="sp-card">
  <div class="mb-5">
    <p class="sp-eyebrow mb-2">Step 4 of 4</p>
    <h1 class="text-xl font-bold text-slate-950">Choose your first skill focus</h1>
    <p class="mt-2 text-sm leading-6 text-slate-600">Pick the area where better workplace communication would help most right now.</p>
  </div>

  @if (error()) {
    <div class="sp-alert-error mb-5">{{ error() }}</div>
  }

  <div class="mb-6 space-y-3">
    @for (skill of skills; track skill.value) {
      <button
        (click)="select(skill.value)"
        [class.ring-2]="selected() === skill.value"
        [class.ring-indigo-500]="selected() === skill.value"
        [class.border-indigo-300]="selected() === skill.value"
        class="sp-option">
        <span class="block font-semibold text-slate-900">{{ skill.label }}</span>
        <span class="mt-1 block text-sm leading-5 text-slate-600">{{ skill.description }}</span>
      </button>
    }
  </div>

  <div class="flex flex-col gap-3 sm:flex-row">
    <a routerLink="/onboarding/step-3" class="sp-button-secondary flex-1">Back</a>
    <button (click)="finish()" [disabled]="selected() === null || submitting()" class="sp-button-primary flex-1">
      @if (submitting()) { Finishing... } @else { Complete setup }
    </button>
  </div>
</div>
