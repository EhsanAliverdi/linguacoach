<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
  <div class="mb-1 text-xs font-medium text-indigo-600 uppercase tracking-wide">Step 2 of 4</div>
  <h2 class="text-lg font-semibold text-slate-800 mb-1">Select your learning track</h2>
  <p class="text-sm text-slate-500 mb-5">Choose the type of English you want to focus on.</p>

  @if (error()) {
    <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">{{ error() }}</div>
  }

  @if (loading()) {
    <div class="flex justify-center py-8"><div class="w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>
  } @else {
    <div class="space-y-2 mb-6">
      @for (track of tracks(); track track.id) {
        <button (click)="select(track.id)"
          [class.ring-2]="selected() === track.id"
          [class.ring-indigo-500]="selected() === track.id"
          [class.border-indigo-300]="selected() === track.id"
          class="w-full text-left rounded-xl border border-slate-200 px-4 py-3 hover:border-indigo-300 hover:bg-indigo-50 transition-all">
          <div class="font-medium text-slate-800">{{ track.name }}</div>
          <div class="text-xs text-slate-500 mt-0.5">{{ track.description }}</div>
        </button>
      }
    </div>

    <button (click)="next()" [disabled]="!selected() || submitting()"
      class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700 disabled:opacity-50 transition-colors">
      @if (submitting()) { Saving… } @else { Continue }
    </button>
  }
</div>
