<div class="sp-card">
  <div class="mb-5">
    <p class="sp-eyebrow mb-2">Step 2 of 4</p>
    <h1 class="text-xl font-bold text-slate-950">How much time do you want to spend in each lesson?</h1>
    <p class="mt-2 text-sm leading-6 text-slate-600">We'll use this to build lessons that fit your schedule.</p>
  </div>

  @if (error()) {
    <div class="sp-alert-error mb-5">{{ error() }}</div>
  }

  <div class="mb-6 space-y-3">
    @for (d of durations; track d.minutes) {
      <button
        (click)="select(d.minutes)"
        [class.ring-2]="selected() === d.minutes"
        [class.ring-indigo-500]="selected() === d.minutes"
        [class.border-indigo-300]="selected() === d.minutes"
        class="sp-option">
        <span class="block font-semibold text-slate-900">{{ d.label }}</span>
        <span class="mt-1 block text-sm leading-5 text-slate-600">{{ d.hint }}</span>
      </button>
    }
  </div>

  <div class="flex flex-col gap-3 sm:flex-row">
    <a routerLink="/onboarding/step-1" class="sp-button-secondary flex-1">Back</a>
    <button (click)="next()" [disabled]="selected() === null || submitting()" class="sp-button-primary flex-1">
      @if (submitting()) { Saving... } @else { Continue }
    </button>
  </div>
</div>
