<!-- Mobile backdrop -->
<div
  class="fixed inset-0 z-40 bg-gray-900/50 xl:hidden"
  [class.hidden]="!drawerOpen()"
  (click)="closeDrawer()"
></div>

<!-- Mobile sidebar drawer -->
<aside
  class="fixed top-0 left-0 bottom-0 w-[240px] z-50 flex flex-col transition-transform duration-300 ease-in-out xl:hidden"
  style="background:#fff;border-right:1px solid var(--sp-admin-border);"
  [class.-translate-x-full]="!drawerOpen()"
  [class.translate-x-0]="drawerOpen()"
  (touchstart)="onDrawerTouchStart($event)"
  (touchmove)="onDrawerTouchMove($event)"
  (touchend)="onDrawerTouchEnd()"
>
  <!-- Drawer brand -->
  <div class="flex items-center justify-between px-4 flex-shrink-0" style="height:var(--sp-admin-header-h);border-bottom:1px solid var(--sp-admin-border);">
    <a routerLink="/admin" (click)="closeDrawer()" class="flex items-center gap-3 no-underline">
      <svg class="w-8 h-8" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <defs><linearGradient id="lg-drawer" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7A59"/><stop offset=".52" stop-color="#B45CF0"/><stop offset="1" stop-color="#5B4BE8"/></linearGradient></defs>
        <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg-drawer)"/>
        <circle cx="14" cy="33" r="3.4" fill="#fff"/>
        <circle cx="24" cy="26" r="3.4" fill="#fff" opacity=".92"/>
        <path d="M30 12.5h6.5A3.5 3.5 0 0 1 40 16v3.5a3.5 3.5 0 0 1-3.5 3.5H34l-3.2 2.3.2-2.3h-1A3.5 3.5 0 0 1 26.5 19.5V16A3.5 3.5 0 0 1 30 12.5Z" fill="#fff"/>
        <path d="M15.4 30.6 22 27.2M25.7 23.4l3.2-2.6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".75"/>
      </svg>
      <div>
        <div class="text-sm font-bold leading-tight" style="color:var(--sp-admin-text)">SpeakPath</div>
        <div class="text-[10px] font-bold uppercase tracking-wider" style="color:var(--sp-admin-text-muted)">Admin</div>
      </div>
    </a>
    <button (click)="closeDrawer()" aria-label="Close navigation"
      class="flex items-center justify-center w-8 h-8 rounded-lg bg-transparent cursor-pointer"
      style="border:1px solid var(--sp-admin-border);color:var(--sp-admin-text-muted)"
      onmouseover="this.style.background='var(--sp-admin-bg)'" onmouseout="this.style.background='transparent'">
      <sp-admin-icon name="x" size="sm" />
    </button>
  </div>

  <!-- Drawer nav -->
  <nav class="flex-1 overflow-y-auto no-scrollbar px-3 py-4" aria-label="Mobile navigation">
    <div class="mb-2">
      <sp-admin-sidebar-section label="Overview" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="Dashboard" route="/admin" [exact]="true" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="grid" />
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
    <div class="mb-2">
      <sp-admin-sidebar-section label="Students" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="Students" route="/admin/students" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="users" />
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
    <div class="mb-2">
      <sp-admin-sidebar-section label="AI System" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="AI Config" route="/admin/ai-config" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="cpu" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="AI Operations" route="/admin/ai-operations" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="activity" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Prompts" route="/admin/prompts" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="message-square" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="AI Usage" route="/admin/usage" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="bar-chart" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Usage Policies" route="/admin/usage-policies" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="shield-check" />
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
    <div class="mb-2">
      <sp-admin-sidebar-section label="Analytics" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="Usage & Analytics" route="/admin/usage-analytics" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="activity" />
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
    <div class="mb-2">
      <sp-admin-sidebar-section label="Content" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="Lessons" route="/admin/lessons" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="book-open" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Curriculum" route="/admin/curriculum" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="book" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Exercise Types" route="/admin/exercise-types" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="list" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Onboarding" route="/admin/onboarding" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="list" />
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
    <div>
      <sp-admin-sidebar-section label="System" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="Notifications" route="/admin/notifications" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="bell" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Integrations" route="/admin/integrations" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="database" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Diagnostics" route="/admin/diagnostics" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="diagnostics" />
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Security" route="/admin/security" [collapsed]="false" (itemClick)="closeDrawer()">
          <sp-admin-icon name="shield" />
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
  </nav>
</aside>

<!-- ── Main shell ─────────────────────────────────────────────────────── -->
<sp-admin-layout [collapsed]="collapsed()">

  <!-- Desktop sidebar -->
  <sp-admin-sidebar slot="sidebar" [collapsed]="collapsed()">

    <!-- Brand -->
    <div class="flex items-center flex-shrink-0 px-4"
      style="height:var(--sp-admin-header-h);border-bottom:1px solid var(--sp-admin-border);"
      [class.justify-center]="collapsed()">
      <a routerLink="/admin" class="flex items-center gap-3 no-underline overflow-hidden">
        <svg class="w-9 h-9 flex-shrink-0" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="lg-admin-brand" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FF7A59"/><stop offset=".52" stop-color="#B45CF0"/><stop offset="1" stop-color="#5B4BE8"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg-admin-brand)"/>
          <circle cx="14" cy="33" r="3.4" fill="#fff"/>
          <circle cx="24" cy="26" r="3.4" fill="#fff" opacity=".92"/>
          <path d="M30 12.5h6.5A3.5 3.5 0 0 1 40 16v3.5a3.5 3.5 0 0 1-3.5 3.5H34l-3.2 2.3.2-2.3h-1A3.5 3.5 0 0 1 26.5 19.5V16A3.5 3.5 0 0 1 30 12.5Z" fill="#fff"/>
          <path d="M15.4 30.6 22 27.2M25.7 23.4l3.2-2.6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".75"/>
        </svg>
        @if (!collapsed()) {
          <div class="overflow-hidden">
            <div class="text-sm font-bold whitespace-nowrap leading-tight" style="color:var(--sp-admin-text)">SpeakPath</div>
            <div class="text-[10px] font-bold uppercase tracking-wider whitespace-nowrap" style="color:var(--sp-admin-text-muted)">Admin Panel</div>
          </div>
        }
      </a>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto no-scrollbar px-3 py-4" aria-label="Admin navigation">

      <!-- OVERVIEW -->
      <div class="mb-2">
        <sp-admin-sidebar-section label="Overview" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="Dashboard" route="/admin" [exact]="true" [collapsed]="collapsed()">
            <sp-admin-icon name="grid" />
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>

      <!-- STUDENTS -->
      <div class="mb-2">
        <sp-admin-sidebar-section label="Students" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="Students" route="/admin/students" [collapsed]="collapsed()">
            <sp-admin-icon name="users" />
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>

      <!-- AI SYSTEM -->
      <div class="mb-2">
        <sp-admin-sidebar-section label="AI System" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="AI Config" route="/admin/ai-config" [collapsed]="collapsed()">
            <sp-admin-icon name="cpu" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="AI Operations" route="/admin/ai-operations" [collapsed]="collapsed()">
            <sp-admin-icon name="activity" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Prompts" route="/admin/prompts" [collapsed]="collapsed()">
            <sp-admin-icon name="message-square" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="AI Usage" route="/admin/usage" [collapsed]="collapsed()">
            <sp-admin-icon name="bar-chart" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Usage Policies" route="/admin/usage-policies" [collapsed]="collapsed()">
            <sp-admin-icon name="shield-check" />
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>

      <!-- ANALYTICS -->
      <div class="mb-2">
        <sp-admin-sidebar-section label="Analytics" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="Usage & Analytics" route="/admin/usage-analytics" [collapsed]="collapsed()">
            <sp-admin-icon name="activity" />
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>

      <!-- CONTENT -->
      <div class="mb-2">
        <sp-admin-sidebar-section label="Content" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="Lessons" route="/admin/lessons" [collapsed]="collapsed()">
            <sp-admin-icon name="book-open" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Curriculum" route="/admin/curriculum" [collapsed]="collapsed()">
            <sp-admin-icon name="book" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Exercise Types" route="/admin/exercise-types" [collapsed]="collapsed()">
            <sp-admin-icon name="list" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Onboarding" route="/admin/onboarding" [collapsed]="collapsed()">
            <sp-admin-icon name="list" />
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>

      <!-- SYSTEM -->
      <div>
        <sp-admin-sidebar-section label="System" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="Notifications" route="/admin/notifications" [collapsed]="collapsed()">
            <sp-admin-icon name="bell" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Integrations" route="/admin/integrations" [collapsed]="collapsed()">
            <sp-admin-icon name="database" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Diagnostics" route="/admin/diagnostics" [collapsed]="collapsed()">
            <sp-admin-icon name="diagnostics" />
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Security" route="/admin/security" [collapsed]="collapsed()">
            <sp-admin-icon name="shield" />
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>

    </nav>

  </sp-admin-sidebar>

  <!-- Header -->
  <sp-admin-header slot="header">

    <!-- Mobile hamburger -->
    <button (click)="openDrawer()" class="xl:hidden flex items-center justify-center w-9 h-9 rounded-lg cursor-pointer sp-adm-hdr-toggle" aria-label="Open navigation">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Desktop sidebar toggle — << collapse / >> expand -->
    <button (click)="toggleSidebar()" class="hidden xl:flex items-center justify-center cursor-pointer sp-adm-hdr-toggle sp-adm-hdr-toggle--outlined" [title]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'" aria-label="Toggle sidebar">
      @if (collapsed()) {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>
        </svg>
      } @else {
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/>
        </svg>
      }
    </button>

    <!-- User menu -->
    <div user>
      <sp-admin-user-menu [email]="adminEmail()" [initial]="adminInitial()" (signOut)="logout()" />
    </div>

  </sp-admin-header>

  <!-- Page content -->
  <router-outlet />
  <sp-admin-toast-outlet />

</sp-admin-layout>
