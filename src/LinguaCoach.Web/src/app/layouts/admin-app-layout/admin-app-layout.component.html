<!-- Mobile backdrop -->
<div
  class="fixed inset-0 z-40 bg-gray-900/50 xl:hidden"
  [class.hidden]="!drawerOpen()"
  (click)="closeDrawer()"
></div>

<!-- Mobile sidebar drawer -->
<aside
  class="fixed top-0 left-0 bottom-0 w-[290px] bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 z-50 flex flex-col transition-transform duration-300 ease-in-out xl:hidden"
  [class.-translate-x-full]="!drawerOpen()"
  [class.translate-x-0]="drawerOpen()"
  (touchstart)="onDrawerTouchStart($event)"
  (touchmove)="onDrawerTouchMove($event)"
  (touchend)="onDrawerTouchEnd()"
>
  <!-- Drawer brand -->
  <div class="flex items-center justify-between px-4 py-4 border-b border-gray-200 dark:border-gray-800 flex-shrink-0">
    <a routerLink="/admin" (click)="closeDrawer()" class="flex items-center gap-3 no-underline">
      <svg class="w-8 h-8" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <defs><linearGradient id="lg-drawer" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7A59"/><stop offset=".52" stop-color="#B45CF0"/><stop offset="1" stop-color="#5B4BE8"/></linearGradient></defs>
        <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg-drawer)"/>
        <circle cx="14" cy="33" r="3.4" fill="#fff"/>
        <circle cx="24" cy="26" r="3.4" fill="#fff" opacity=".92"/>
        <path d="M30 12.5h6.5A3.5 3.5 0 0 1 40 16v3.5a3.5 3.5 0 0 1-3.5 3.5H34l-3.2 2.3.2-2.3h-1A3.5 3.5 0 0 1 26.5 19.5V16A3.5 3.5 0 0 1 30 12.5Z" fill="#fff"/>
        <path d="M15.4 30.6 22 27.2M25.7 23.4l3.2-2.6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".75"/>
      </svg>
      <div>
        <div class="text-sm font-bold text-gray-900 dark:text-white leading-tight">SpeakPath</div>
        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Admin</div>
      </div>
    </a>
    <button (click)="closeDrawer()" aria-label="Close navigation"
      class="flex items-center justify-center w-8 h-8 rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Drawer nav -->
  <nav class="flex-1 overflow-y-auto no-scrollbar px-3 py-4" aria-label="Mobile navigation">
    <div class="mb-4">
      <sp-admin-sidebar-section label="Menu" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="Dashboard" route="/admin" [exact]="true" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Students" route="/admin/students" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="AI Config" route="/admin/ai-config" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07M4.93 4.93a10 10 0 0 0 0 14.14M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Prompts" route="/admin/prompts" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="AI Usage" route="/admin/usage" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Exercise Types" route="/admin/exercise-types" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Notifications" route="/admin/notifications" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
    <div>
      <sp-admin-sidebar-section label="System" [collapsed]="false" />
      <ul class="flex flex-col gap-1">
        <li><sp-admin-sidebar-nav-item label="Integrations" route="/admin/integrations" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
        </sp-admin-sidebar-nav-item></li>
        <li><sp-admin-sidebar-nav-item label="Diagnostics" route="/admin/diagnostics" [collapsed]="false" (itemClick)="closeDrawer()">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </sp-admin-sidebar-nav-item></li>
      </ul>
    </div>
  </nav>
</aside>

<!-- ── Main shell ─────────────────────────────────────────────────────── -->
<sp-admin-layout [collapsed]="collapsed()">

  <!-- Desktop sidebar -->
  <sp-admin-sidebar slot="sidebar" [collapsed]="collapsed()">

    <!-- Brand -->
    <div class="flex items-center border-b border-gray-200 dark:border-gray-800 flex-shrink-0 h-16 px-4"
      [class.justify-center]="collapsed()">
      <a routerLink="/admin" class="flex items-center gap-3 no-underline overflow-hidden">
        <svg class="w-9 h-9 flex-shrink-0" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="lg-admin-brand" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FF7A59"/><stop offset=".52" stop-color="#B45CF0"/><stop offset="1" stop-color="#5B4BE8"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg-admin-brand)"/>
          <circle cx="14" cy="33" r="3.4" fill="#fff"/>
          <circle cx="24" cy="26" r="3.4" fill="#fff" opacity=".92"/>
          <path d="M30 12.5h6.5A3.5 3.5 0 0 1 40 16v3.5a3.5 3.5 0 0 1-3.5 3.5H34l-3.2 2.3.2-2.3h-1A3.5 3.5 0 0 1 26.5 19.5V16A3.5 3.5 0 0 1 30 12.5Z" fill="#fff"/>
          <path d="M15.4 30.6 22 27.2M25.7 23.4l3.2-2.6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".75"/>
        </svg>
        @if (!collapsed()) {
          <div class="overflow-hidden">
            <div class="text-sm font-bold text-gray-900 dark:text-white leading-tight whitespace-nowrap">SpeakPath</div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider whitespace-nowrap">Admin Panel</div>
          </div>
        }
      </a>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto no-scrollbar px-3 py-4" aria-label="Admin navigation">
      <div class="mb-4">
        <sp-admin-sidebar-section label="Menu" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="Dashboard" route="/admin" [exact]="true" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Students" route="/admin/students" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="AI Config" route="/admin/ai-config" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07M4.93 4.93a10 10 0 0 0 0 14.14M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Prompts" route="/admin/prompts" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="AI Usage" route="/admin/usage" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Exercise Types" route="/admin/exercise-types" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Notifications" route="/admin/notifications" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>
      <div>
        <sp-admin-sidebar-section label="System" [collapsed]="collapsed()" />
        <ul class="flex flex-col gap-1">
          <li><sp-admin-sidebar-nav-item label="Integrations" route="/admin/integrations" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
          </sp-admin-sidebar-nav-item></li>
          <li><sp-admin-sidebar-nav-item label="Diagnostics" route="/admin/diagnostics" [collapsed]="collapsed()">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </sp-admin-sidebar-nav-item></li>
        </ul>
      </div>
    </nav>

  </sp-admin-sidebar>

  <!-- Header -->
  <sp-admin-header slot="header">

    <!-- Mobile hamburger -->
    <button (click)="openDrawer()" class="xl:hidden flex items-center justify-center w-9 h-9 rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer" aria-label="Open navigation">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- Desktop sidebar toggle -->
    <button (click)="toggleSidebar()" class="hidden xl:flex items-center justify-center w-9 h-9 rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer" [title]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'" aria-label="Toggle sidebar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- User menu -->
    <div user>
      <sp-admin-user-menu [email]="adminEmail()" [initial]="adminInitial()" (signOut)="logout()" />
    </div>

  </sp-admin-header>

  <!-- Page content -->
  <router-outlet />
  <sp-admin-toast-outlet />

</sp-admin-layout>
