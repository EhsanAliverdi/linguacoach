<div class="sp-student-app">

  <!-- Desktop sidebar (no toggle button inside) -->
  <aside class="sp-student-sidebar" [class.sp-sidebar-collapsed]="collapsed()">

    <a routerLink="/dashboard" class="sp-sidebrand">
      <svg width="34" height="34" viewBox="0 0 48 48" fill="none" aria-hidden="true" style="flex-shrink:0">
        <defs>
          <linearGradient id="lg-layout-side" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF7A59"/><stop offset=".52" stop-color="#B45CF0"/><stop offset="1" stop-color="#5B4BE8"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg-layout-side)"/>
        <circle cx="14" cy="33" r="3.4" fill="#fff"/>
        <circle cx="24" cy="26" r="3.4" fill="#fff" opacity=".92"/>
        <path d="M30 12.5h6.5A3.5 3.5 0 0 1 40 16v3.5a3.5 3.5 0 0 1-3.5 3.5H34l-3.2 2.3.2-2.3h-1A3.5 3.5 0 0 1 26.5 19.5V16A3.5 3.5 0 0 1 30 12.5Z" fill="#fff"/>
        <path d="M15.4 30.6 22 27.2M25.7 23.4l3.2-2.6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".75"/>
      </svg>
      <span class="sp-sidebar-label" style="font-size:17px;font-weight:800;color:var(--sp-ink)"><span>Speak</span><span style="color:var(--sp-writing)">Path</span></span>
    </a>

    <nav style="display:flex;flex-direction:column;gap:4px;flex:1;margin-top:16px">
      <a routerLink="/dashboard" routerLinkActive="is-active" class="sp-sidelink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="sp-sidebar-label">Dashboard</span>
      </a>
      <a routerLink="/my-path" routerLinkActive="is-active" class="sp-sidelink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="sp-sidebar-label">My Path</span>
      </a>
      <a routerLink="/activity" routerLinkActive="is-active is-practice" class="sp-sidelink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span class="sp-sidebar-label">Practice</span>
      </a>
      <a routerLink="/progress" routerLinkActive="is-active" class="sp-sidelink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="sp-sidebar-label">Progress</span>
      </a>
      <a routerLink="/vocabulary" routerLinkActive="is-active" class="sp-sidelink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="sp-sidebar-label">Vocabulary</span>
      </a>
      <a routerLink="/profile" routerLinkActive="is-active" class="sp-sidelink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="sp-sidebar-label">Profile</span>
      </a>
    </nav>

    <!-- Streak card (hidden when collapsed) -->
    <div class="sp-sidebar-streak" style="background:var(--sp-grad-brand-soft);border:1px solid #EADBFF;border-radius:var(--sp-r-lg);padding:14px;margin-top:16px">
      <div style="font-size:22px;margin-bottom:6px">🔥</div>
      <p style="font-size:13px;font-weight:800;color:var(--sp-ink);margin-bottom:4px">Build your streak</p>
      <p style="font-size:12px;font-weight:500;color:var(--sp-text)">Practice every day!</p>
    </div>

    <!-- Sign out -->
    <button (click)="logout()" class="sp-sidelink" style="margin-top:12px;color:var(--sp-muted)">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="sp-sidebar-label">Sign out</span>
    </button>
  </aside>

  <!-- Main column -->
  <div class="sp-student-main" [class.sp-main-collapsed]="collapsed()">

    <!-- Sticky frosted header -->
    <header class="sp-student-header">

      <!-- Left side -->
      <div class="sp-header-left">

        <!-- Mobile-only: SpeakPath logo (taps to Dashboard) -->
        <a routerLink="/dashboard" class="sp-header-logo" aria-label="Go to Dashboard">
          <svg width="30" height="30" viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="lg-header" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FF7A59"/><stop offset=".52" stop-color="#B45CF0"/><stop offset="1" stop-color="#5B4BE8"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg-header)"/>
            <circle cx="14" cy="33" r="3.4" fill="#fff"/>
            <circle cx="24" cy="26" r="3.4" fill="#fff" opacity=".92"/>
            <path d="M30 12.5h6.5A3.5 3.5 0 0 1 40 16v3.5a3.5 3.5 0 0 1-3.5 3.5H34l-3.2 2.3.2-2.3h-1A3.5 3.5 0 0 1 26.5 19.5V16A3.5 3.5 0 0 1 30 12.5Z" fill="#fff"/>
            <path d="M15.4 30.6 22 27.2M25.7 23.4l3.2-2.6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".75"/>
          </svg>
          <span class="sp-header-wordmark"><span>Speak</span><span style="color:var(--sp-writing)">Path</span></span>
        </a>

        <!-- Desktop-only: collapse/expand sidebar toggle -->
        <button (click)="toggleSidebar()" class="sp-layout-header-action" [title]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <!-- Greeting -->
        <div class="sp-header-greeting">
          <div class="sp-greet-sm">{{ greetingTime() }} 👋</div>
          <div class="sp-greet-lg">Hi, {{ firstName() }}</div>
        </div>

      </div>

      <!-- Right side: streak + bell + avatar -->
      <div class="sp-header-actions">
        <!-- Streak pill -->
        <div class="sp-streak-pill">
          🔥 <span>— day</span>
        </div>
        <!-- Notification bell -->
        <button class="sp-header-icon-btn" aria-label="Notifications">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <!-- Avatar -->
        <div class="sp-header-avatar">{{ avatarLetter() }}</div>
      </div>

    </header>

    <!-- Content -->
    <main class="sp-student-content">
      <router-outlet />
    </main>

  </div>

  <!-- Mobile bottom nav (unchanged) -->
  <nav class="sp-bottomnav">
    <a routerLink="/dashboard" routerLinkActive="is-active" class="sp-navbtn">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Home</span>
    </a>
    <a routerLink="/my-path" routerLinkActive="is-active" class="sp-navbtn">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      <span>My Path</span>
    </a>
    <a routerLink="/activity" routerLinkActive="is-active" class="sp-navbtn sp-navbtn-practice">
      <div class="sp-practice-fab">
        <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
    </a>
    <a routerLink="/progress" routerLinkActive="is-active" class="sp-navbtn">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Progress</span>
    </a>
    <a routerLink="/profile" routerLinkActive="is-active" class="sp-navbtn">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

</div>
