<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpeakPath — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet" />
<style>
:root{
  /* Brand */
  --coral:#FF7A59; --magenta:#B45CF0; --indigo:#5B4BE8;
  --grad-brand:linear-gradient(135deg,#FF7A59 0%,#B45CF0 52%,#5B4BE8 100%);
  --grad-brand-soft:linear-gradient(135deg,#FFF0EA 0%,#F4ECFF 55%,#ECEAFF 100%);
  --grad-warm:linear-gradient(135deg,#FF8A6B 0%,#FF6FA0 100%);
  --grad-cool:linear-gradient(135deg,#7C6CFF 0%,#5B4BE8 100%);

  /* Skill palettes [solid, soft-bg, on-soft] */
  --writing:#5B4BE8;       --writing-soft:#EDEBFF;   --writing-ink:#3A2EA8;
  --speaking:#FB6B57;      --speaking-soft:#FFEAE4;  --speaking-ink:#C23C2C;
  --listening:#9B5CF6;     --listening-soft:#F2E9FF; --listening-ink:#6B2EB8;
  --vocabulary:#F0982C;    --vocabulary-soft:#FFF1DC;--vocabulary-ink:#B26410;
  --pronunciation:#10B5A4; --pronunciation-soft:#DFF6F2;--pronunciation-ink:#0A7468;

  /* Neutrals (warm lilac-tinted) */
  --ink:#211B36; --text:#4B4462; --muted:#8B85A0; --faint:#BDB8CC;
  --border:#ECE9F5; --border-2:#E2DEF0;
  --surface:#FFFFFF; --surface-2:#FBFAFE; --canvas:#F6F4FB; --canvas-2:#EFECF9;

  /* Status */
  --success:#13B07C; --success-soft:#E0F6EE;
  --warn:#F0982C; --warn-soft:#FFF1DC;
  --info:#5B4BE8;

  /* Shadows (indigo-tinted) */
  --sh-xs:0 1px 2px rgba(33,27,54,.06);
  --sh-sm:0 2px 8px rgba(60,48,140,.07);
  --sh-md:0 8px 24px rgba(60,48,140,.10);
  --sh-lg:0 16px 40px rgba(60,48,140,.14);
  --sh-glow:0 10px 30px rgba(123,80,220,.30);

  /* Radius */
  --r-xs:10px; --r-sm:14px; --r:18px; --r-lg:22px; --r-xl:28px; --r-2xl:34px; --r-full:999px;

  --ff:'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--ff); color:var(--text); background:var(--canvas);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  font-size:15px; line-height:1.5;
}
#root{min-height:100vh;}
h1,h2,h3,h4{margin:0; color:var(--ink); font-weight:800; letter-spacing:-.02em; line-height:1.15;}
p{margin:0;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,textarea{font-family:inherit;}
::selection{background:rgba(123,80,220,.18);}
.sp-app *::-webkit-scrollbar{width:9px;height:9px;}
.sp-app *::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:99px;}

/* ---------- App shell ---------- */
.sp-app{min-height:100vh;background:
  radial-gradient(1100px 520px at 88% -8%, #F1ECFF 0%, transparent 60%),
  radial-gradient(900px 460px at -6% 4%, #FFEDE6 0%, transparent 55%),
  var(--canvas);
}
.sp-shell{display:flex; min-height:100vh;}
.sp-side{display:none;}
.sp-main{flex:1; min-width:0; display:flex; flex-direction:column;}
.sp-content{flex:1; width:100%; max-width:520px; margin:0 auto; padding:18px 18px 108px;}

/* Desktop */
@media(min-width:900px){
  .sp-side{display:flex; flex-direction:column; width:264px; flex-shrink:0;
    position:sticky; top:0; height:100vh; padding:26px 18px;
    background:rgba(255,255,255,.66); backdrop-filter:blur(12px);
    border-right:1px solid var(--border); transition:width .24s cubic-bezier(.4,0,.2,1), padding .24s cubic-bezier(.4,0,.2,1);}
  .sp-content{max-width:1080px; padding:30px 40px 60px;}
  .sp-bottomnav{display:none !important;}
  .sp-topbar{padding:16px 40px;}

  /* Collapsed sidebar (desktop) */
  .sp-app.nav-collapsed .sp-side{width:80px; padding:26px 14px;}
  .sp-app.nav-collapsed .sp-sidebrand{justify-content:center; padding:2px 0 22px;}
  .sp-app.nav-collapsed .sp-sideword{opacity:0; width:0; overflow:hidden;}
  .sp-app.nav-collapsed .sp-sidelink{justify-content:center; padding:12px 0; gap:0;}
  .sp-app.nav-collapsed .sp-sidelabel{display:none;}
  .sp-app.nav-collapsed .sp-sidelink.is-active::before{display:none;}
  .sp-app.nav-collapsed .sp-sidecard{padding:0; background:none !important; border:none !important; box-shadow:none; display:flex; justify-content:center;}
  .sp-app.nav-collapsed .sp-sidecard-body{display:none;}
  .sp-sidecard-flame{display:none;}
  .sp-app.nav-collapsed .sp-sidecard-flame{display:grid;}
}
.sp-topbar .sp-collapse-btn{display:none; margin-left:var(--sp-collapse-ml,0px); transition:margin-left .22s cubic-bezier(.4,0,.2,1);}
@media(min-width:900px){.sp-topbar .sp-collapse-btn{display:grid;}}

/* ---------- Top bar ---------- */
.sp-topbar{display:flex; align-items:center; justify-content:space-between; gap:12px;
  position:sticky; top:0; z-index:30; width:100%; padding:12px 18px;
  background:rgba(250,249,254,.82); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);}
.sp-topbar-inner{display:flex; align-items:center; justify-content:space-between; gap:12px;
  max-width:1080px; margin:0 auto; width:100%;}
@media(min-width:900px){
  .sp-topbar{padding:16px 40px;}
  .sp-topbar-inner{max-width:none;}
  .sp-mobile-logo{display:none !important;}
}
.sp-greet-sm{font-size:12px; color:var(--muted); font-weight:600;}
.sp-greet-lg{font-size:19px; font-weight:800; color:var(--ink); margin-top:1px;}
.sp-iconbtn{display:grid; place-items:center; width:40px; height:40px; border-radius:50%;
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  box-shadow:var(--sh-xs); cursor:pointer; position:relative; transition:transform .15s, border-color .15s;}
.sp-iconbtn:hover{border-color:var(--indigo); color:var(--indigo);}
.sp-iconbtn:active{transform:scale(.93);}
.sp-dot{position:absolute; top:8px; right:9px; width:8px; height:8px; border-radius:50%;
  background:var(--speaking); border:2px solid var(--surface);}

/* ---------- Bottom nav ---------- */
.sp-bottomnav{position:fixed; left:0; right:0; bottom:0; z-index:40;
  display:flex; justify-content:space-around; align-items:center;
  padding:9px 8px calc(9px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.85); backdrop-filter:blur(16px);
  border-top:1px solid var(--border);}
.sp-navbtn{display:flex; flex-direction:column; align-items:center; gap:3px;
  flex:1; padding:5px 2px; color:var(--faint); border-radius:14px;
  transition:color .18s, transform .18s;}
.sp-navbtn span{font-size:10.5px; font-weight:700; letter-spacing:.01em;}
.sp-navbtn.is-active{color:var(--indigo);}
.sp-navbtn:active{transform:scale(.92);}

/* Sidebar items */
.sp-sidebrand{display:flex; align-items:center; gap:11px; padding:2px 8px 22px;}
.sp-sidelink{display:flex; align-items:center; gap:13px; padding:11px 13px;
  border-radius:14px; color:var(--text); font-weight:700; font-size:14.5px;
  transition:background .16s,color .16s; position:relative;}
.sp-sidelink:hover{background:var(--canvas-2);}
.sp-sidelink.is-active{background:var(--surface); color:var(--ink); box-shadow:var(--sh-sm);}
.sp-sidelink.is-active::before{content:""; position:absolute; left:-18px; top:50%;
  transform:translateY(-50%); width:4px; height:22px; border-radius:99px; background:var(--grad-brand);}

/* ---------- Cards & primitives ---------- */
.sp-card{background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); box-shadow:var(--sh-sm);}
.sp-card-pad{padding:18px;}
.sp-fade{animation:none;}
@keyframes spfade{from{opacity:1;} to{opacity:1;}}
.sp-stagger>*{animation:none;}
.sp-stagger>*:nth-child(1){animation-delay:.02s;}
.sp-stagger>*:nth-child(2){animation-delay:.07s;}
.sp-stagger>*:nth-child(3){animation-delay:.12s;}
.sp-stagger>*:nth-child(4){animation-delay:.17s;}
.sp-stagger>*:nth-child(5){animation-delay:.22s;}
.sp-stagger>*:nth-child(6){animation-delay:.27s;}
.sp-stagger>*{animation:none !important;}

/* Buttons */
.sp-btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-weight:700; font-size:15px; border-radius:var(--r-sm); padding:13px 20px;
  transition:transform .15s, box-shadow .2s, background .2s; white-space:nowrap;}
.sp-btn:active{transform:scale(.97);}
.sp-btn-primary{background:var(--grad-brand); color:#fff; box-shadow:var(--sh-glow);}
.sp-btn-primary:hover{box-shadow:0 14px 36px rgba(123,80,220,.4);}
.sp-btn-ghost{background:var(--surface); color:var(--ink); border:1.5px solid var(--border-2);}
.sp-btn-ghost:hover{border-color:var(--indigo); color:var(--indigo);}
.sp-btn-soft{background:var(--canvas-2); color:var(--ink);}
.sp-btn-block{display:flex; width:100%;}

/* Pills / chips */
.sp-pill{display:inline-flex; align-items:center; gap:6px; font-weight:700;
  font-size:12px; padding:5px 11px; border-radius:var(--r-full);}
.sp-chip{display:inline-flex; align-items:center; gap:7px; font-weight:600;
  font-size:13.5px; padding:9px 14px; border-radius:var(--r-full);
  background:var(--surface); border:1.5px solid var(--border-2); color:var(--text);
  transition:all .16s; cursor:pointer;}
.sp-chip:hover{border-color:var(--indigo); color:var(--indigo); transform:translateY(-1px);}
.sp-chip.is-on{background:var(--writing-soft); border-color:transparent; color:var(--writing-ink);}

/* Progress bar */
.sp-prog{height:9px; border-radius:99px; background:var(--canvas-2); overflow:hidden;}
.sp-prog>i{display:block; height:100%; border-radius:99px; background:linear-gradient(135deg,#FF7A59 0%,#B45CF0 52%,#5B4BE8 100%);
  transition:width .9s cubic-bezier(.22,1,.36,1);}

/* AI badge */
.sp-ai{display:inline-flex; align-items:center; gap:5px; font-weight:700; font-size:11px;
  padding:4px 9px 4px 7px; border-radius:99px; color:#6B2EB8; letter-spacing:.01em;
  background:linear-gradient(120deg,#F4ECFF,#FFE9E2); border:1px solid #EADBFF;}
.sp-fallback{background:var(--warn-soft); color:var(--warn-ink,#B26410); border:1px solid #F6E2C2;}

.sp-section-h{display:flex; align-items:center; justify-content:space-between; margin:26px 2px 12px;}
.sp-section-h h3{font-size:16px;}
.sp-section-h a{font-size:13px; font-weight:700; color:var(--indigo); display:inline-flex; align-items:center; gap:3px;}

.sp-muted{color:var(--muted);} .sp-faint{color:var(--faint);}
.sp-row{display:flex; align-items:center;}
.sp-icobox{display:grid; place-items:center; border-radius:var(--r-sm); flex-shrink:0;}

/* Layout helpers */
.sp-statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:11px;}
.sp-skillgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:11px;}
.sp-col{display:flex; flex-direction:column;}
.sp-grid2{display:grid; gap:18px;}
@media(min-width:900px){
  .sp-grid2{grid-template-columns:1.55fr 1fr; align-items:start;}
  .sp-skillgrid{grid-template-columns:repeat(5,1fr);}
  .sp-skillgrid.cols-3{grid-template-columns:repeat(3,1fr);}
}
.sp-h1{font-size:25px;} @media(min-width:900px){.sp-h1{font-size:30px;}}
.grad-brand{background:
  radial-gradient(150px 130px at 86% 8%, rgba(255,255,255,.22), transparent 62%),
  radial-gradient(180px 150px at 12% 120%, rgba(255,255,255,.14), transparent 60%),
  linear-gradient(135deg,#FF7A59 0%,#B45CF0 52%,#5B4BE8 100%);}
.grad-cool{background:
  radial-gradient(160px 140px at 88% 6%, rgba(255,255,255,.18), transparent 60%),
  linear-gradient(135deg,#7C6CFF 0%,#5B4BE8 100%);}
.grad-warm{background:linear-gradient(135deg,#FF8A6B 0%,#FF6FA0 100%);}
.grad-soft{background:linear-gradient(135deg,#FFF0EA 0%,#F4ECFF 55%,#ECEAFF 100%);}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/screens.jsx"></script>
<script type="text/babel" src="app/activity.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
<script type="text/babel">
  const { App } = window.SP;
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
