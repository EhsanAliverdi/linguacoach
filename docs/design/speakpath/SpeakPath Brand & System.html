<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpeakPath — Brand & Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
:root{
  --coral:#FF7A59; --magenta:#B45CF0; --indigo:#5B4BE8;
  --grad-brand:linear-gradient(135deg,#FF7A59 0%,#B45CF0 52%,#5B4BE8 100%);
  --grad-brand-soft:linear-gradient(135deg,#FFF0EA 0%,#F4ECFF 55%,#ECEAFF 100%);
  --grad-cool:linear-gradient(135deg,#7C6CFF 0%,#5B4BE8 100%);
  --writing:#5B4BE8;--writing-soft:#EDEBFF;--writing-ink:#3A2EA8;
  --speaking:#FB6B57;--speaking-soft:#FFEAE4;--speaking-ink:#C23C2C;
  --listening:#9B5CF6;--listening-soft:#F2E9FF;--listening-ink:#6B2EB8;
  --vocabulary:#F0982C;--vocabulary-soft:#FFF1DC;--vocabulary-ink:#B26410;
  --pronunciation:#10B5A4;--pronunciation-soft:#DFF6F2;--pronunciation-ink:#0A7468;
  --ink:#211B36;--text:#4B4462;--muted:#8B85A0;--faint:#BDB8CC;
  --border:#ECE9F5;--border-2:#E2DEF0;--surface:#FFFFFF;--surface-2:#FBFAFE;--canvas:#F6F4FB;--canvas-2:#EFECF9;
  --success:#13B07C;--success-soft:#E0F6EE;--warn:#F0982C;--warn-soft:#FFF1DC;
  --sh-xs:0 1px 2px rgba(33,27,54,.06);--sh-sm:0 2px 8px rgba(60,48,140,.07);
  --sh-md:0 8px 24px rgba(60,48,140,.10);--sh-lg:0 16px 40px rgba(60,48,140,.14);--sh-glow:0 10px 30px rgba(123,80,220,.30);
  --r-sm:14px;--r:18px;--r-lg:22px;--r-xl:28px;--r-full:999px;
  --ff:'Plus Jakarta Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--ff);color:var(--text);background:#EEEAF6;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{margin:0;color:var(--ink);font-weight:800;letter-spacing:-.02em;line-height:1.12;}
p{margin:0;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.sp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);}
.sp-card-pad{padding:18px;}
.sp-icobox{display:grid;place-items:center;border-radius:var(--r-sm);flex-shrink:0;}
.sp-col{display:flex;flex-direction:column;}
.sp-pill{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;padding:5px 11px;border-radius:var(--r-full);}
.sp-chip{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13.5px;padding:9px 14px;border-radius:var(--r-full);background:var(--surface);border:1.5px solid var(--border-2);color:var(--text);}
.sp-chip.is-on{background:var(--writing-soft);border-color:transparent;color:var(--writing-ink);}
.sp-prog{height:9px;border-radius:99px;background:var(--canvas-2);overflow:hidden;}
.sp-prog>i{display:block;height:100%;border-radius:99px;background:linear-gradient(135deg,#FF7A59 0%,#B45CF0 52%,#5B4BE8 100%);}
.sp-ai{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:11px;padding:4px 9px 4px 7px;border-radius:99px;color:#6B2EB8;background:linear-gradient(120deg,#F4ECFF,#FFE9E2);border:1px solid #EADBFF;}
.sp-fallback{background:var(--warn-soft);color:#B26410;border:1px solid #F6E2C2;}
.sp-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;border-radius:var(--r-sm);padding:13px 20px;white-space:nowrap;}
.sp-btn-primary{background:linear-gradient(135deg,#FF7A59 0%,#B45CF0 52%,#5B4BE8 100%);color:#fff;box-shadow:var(--sh-glow);}
.sp-btn-ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--border-2);}
.sp-btn-soft{background:var(--canvas-2);color:var(--ink);}
.grad-brand{background:radial-gradient(150px 130px at 86% 8%,rgba(255,255,255,.22),transparent 62%),radial-gradient(180px 150px at 12% 120%,rgba(255,255,255,.14),transparent 60%),linear-gradient(135deg,#FF7A59 0%,#B45CF0 52%,#5B4BE8 100%);}
.grad-cool{background:linear-gradient(135deg,#7C6CFF 0%,#5B4BE8 100%);}
.grad-soft{background:linear-gradient(135deg,#FFF0EA 0%,#F4ECFF 55%,#ECEAFF 100%);}
.mono{font-family:var(--mono);font-size:11px;letter-spacing:-.01em;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand-canvas.jsx"></script>
<script type="text/babel">
  const { BrandCanvas } = window.SP;
  ReactDOM.createRoot(document.getElementById("root")).render(<BrandCanvas />);
</script>
</body>
</html>
