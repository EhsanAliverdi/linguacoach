name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  frontend:
    name: Frontend — test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/LinguaCoach.Web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/LinguaCoach.Web

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: src/LinguaCoach.Web

      - name: Build
        run: npm run build -- --configuration production
        working-directory: src/LinguaCoach.Web

