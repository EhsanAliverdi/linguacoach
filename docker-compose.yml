services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: linguacoach_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Database=linguacoach_dev;Username=postgres;Password=postgres"
      Jwt__Key: "${JWT_KEY:-CHANGE_ME_IN_PRODUCTION_USE_A_SECRET_AT_LEAST_32_CHARS}"
      Seed__AdminEmail: "${SEED_ADMIN_EMAIL:-admin@linguacoach.local}"
      Seed__AdminPassword: "${SEED_ADMIN_PASSWORD:-Admin1234!}"
      Jwt__Issuer: "linguacoach"
      Jwt__Audience: "linguacoach"
      Jwt__ExpiryHours: "24"
      # Suppress non-fatal Kerberos library warning from Npgsql on Debian runtime image
      GSSAPI_KRB5_NO_CONFIGURE: "1"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # TODO (T6-docker): add an Angular frontend container (nginx serving dist/)
  # once the production build has been verified and a Dockerfile for the frontend
  # is written. For local development, run `npm start` inside src/LinguaCoach.Web.

volumes:
  postgres_data:
