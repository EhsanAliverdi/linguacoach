services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: linguacoach_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-speakpath}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-speakpath-dev-secret}"
    ports:
      # API port for the app; console (9002) should NOT be exposed publicly in production.
      # Host port 9000 is reserved by ZSATunnel (Zscaler) on this machine.
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Database=linguacoach_dev;Username=postgres;Password=postgres"
      Jwt__Key: "${JWT_KEY:-CHANGE_ME_IN_PRODUCTION_USE_A_SECRET_AT_LEAST_32_CHARS}"
      Seed__AdminEmail: "${SEED_ADMIN_EMAIL:-admin@linguacoach.local}"
      Seed__AdminPassword: "${SEED_ADMIN_PASSWORD:-Admin1234!}"
      Jwt__Issuer: "linguacoach"
      Jwt__Audience: "linguacoach"
      Jwt__ExpiryHours: "24"
      AI__WritingFeedback__Provider: "${AI__WritingFeedback__Provider:-}"
      AI__WritingFeedback__Model: "${AI__WritingFeedback__Model:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # Suppress non-fatal Kerberos library warning from Npgsql on Debian runtime image
      GSSAPI_KRB5_NO_CONFIGURE: "1"
      Tts__AudioStoragePath: "/app/audio-data"
      # File storage (IFileStorageService). Default Local; set FILE_STORAGE_PROVIDER=Minio to use MinIO.
      FileStorage__Provider: "${FILE_STORAGE_PROVIDER:-Local}"
      FileStorage__LocalBasePath: "${FILE_STORAGE_LOCAL_BASE_PATH:-/app/audio-data}"
      FileStorage__Minio__Endpoint: "${MINIO_ENDPOINT:-minio:9000}"
      FileStorage__Minio__AccessKey: "${MINIO_ACCESS_KEY:-speakpath}"
      FileStorage__Minio__SecretKey: "${MINIO_SECRET_KEY:-speakpath-dev-secret}"
      FileStorage__Minio__BucketName: "${MINIO_BUCKET_NAME:-speakpath-audio}"
      FileStorage__Minio__UseSSL: "${MINIO_USE_SSL:-false}"
      FileStorage__Minio__SignedUrlExpiryMinutes: "${MINIO_SIGNED_URL_EXPIRY_MINUTES:-10}"
      # Background jobs (Quartz)
      BackgroundJobs__Enabled: "${BACKGROUND_JOBS_ENABLED:-true}"
      # Data Protection key persistence + optional at-rest encryption.
      # Keys encrypt notification channel secrets stored in the DB.
      # MUST map to a persistent volume — lost keys = unreadable DB secrets.
      # KeyProtectionMode: None (dev default) | Certificate (production recommended).
      # For Certificate mode, also set CertificatePath + CertificatePassword
      # (or CertificateThumbprint on Windows) and mount the cert file into the container.
      DataProtection__KeysPath: "/app/data-protection-keys"
      DataProtection__ApplicationName: "SpeakPath"
      DataProtection__KeyProtectionMode: "${DP_KEY_PROTECTION_MODE:-None}"
      DataProtection__CertificatePath: "${DP_CERTIFICATE_PATH:-}"
      DataProtection__CertificatePassword: "${DP_CERTIFICATE_PASSWORD:-}"
      DataProtection__CertificateThumbprint: "${DP_CERTIFICATE_THUMBPRINT:-}"
    volumes:
      - audio_data:/app/audio-data
      - dp_keys:/app/data-protection-keys
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./src/LinguaCoach.Web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy
    # `docker compose watch` (or `docker compose up -d --watch`) rebuilds+restarts this service
    # automatically whenever source changes — the image is a baked production nginx build (see
    # Dockerfile), so without this a plain `up -d` keeps serving whatever was last built, silently
    # going stale after any code change. `dist`/`node_modules` are excluded since they're
    # container-internal build output, not source the container should react to.
    develop:
      watch:
        - action: rebuild
          path: ./src/LinguaCoach.Web/src
        - action: rebuild
          path: ./src/LinguaCoach.Web/package.json
        - action: rebuild
          path: ./src/LinguaCoach.Web/package-lock.json
        - action: rebuild
          path: ./src/LinguaCoach.Web/angular.json

volumes:
  postgres_data:
  audio_data:
  minio_data:
  dp_keys:
